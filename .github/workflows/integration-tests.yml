name: Pruebas de Integración

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  integration-tests:
    name: Pruebas de Integración
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pytest-cov

      # Pruebas ya creadas en tests/test_integration.py


      - name: Ejecutar pruebas de integración
        env:
          APP_ENV: test
        run: |
          python -m pytest tests/test_integration.py \
            --cov=app \
            --cov-report=term-missing \
            -v \
            --tb=short \
            --junitxml=integration-results.xml

      - name: Publicar resumen
        if: always()
        run: |
          echo "## 🔗 Resultados de Pruebas de Integración" >> $GITHUB_STEP_SUMMARY
          if [ -f integration-results.xml ]; then
            TESTS=$(grep -oP 'tests="\K[^"]+' integration-results.xml || echo "0")
            FAILURES=$(grep -oP 'failures="\K[^"]+' integration-results.xml || echo "0")
            echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Tests ejecutados | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Fallos | $FAILURES |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Subir resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-integracion
          path: integration-results.xml
          retention-days: 15
