name: Pruebas de Integración

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  integration-tests:
    name: Pruebas de Integración
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pytest-cov pytest-html

      # Pruebas ya creadas en tests/test_integration.py


      - name: Ejecutar pruebas de integración
        env:
          APP_ENV: test
        run: |
          python -m pytest tests/test_integration.py \
            --cov=app \
            --cov-report=html:htmlcov-integration/ \
            --cov-report=term-missing \
            -v \
            --tb=short \
            --junitxml=integration-results.xml \
            --html=integration-report.html --self-contained-html

      - name: Publicar resumen
        if: always()
        run: |
          echo "## 🔗 Resultados de Pruebas de Integración" >> $GITHUB_STEP_SUMMARY
          if [ -f integration-results.xml ]; then
            TESTS=$(grep -oP 'tests="\K[^"]+' integration-results.xml || echo "0")
            FAILURES=$(grep -oP 'failures="\K[^"]+' integration-results.xml || echo "0")
            echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Tests ejecutados | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Fallos | $FAILURES |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Subir resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-integracion
          path: |
            integration-results.xml
            integration-report.html
            htmlcov-integration/
          retention-days: 15

      - name: Preparar reportes para GH Pages
        if: always()
        run: |
          mkdir -p public-integration
          if [ -f integration-report.html ]; then
            cp integration-report.html public-integration/index.html
          else
            echo "<h1>Reporte de integración no disponible</h1>" > public-integration/index.html
          fi
          if [ -d htmlcov-integration ]; then
            cp -r htmlcov-integration public-integration/coverage
          fi

      - name: Deploy Reporte Integracion a GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-integration
          destination_dir: integration
          keep_files: true

      - name: Generar e integrar Index Dashboard
        if: always()
        run: |
          python3 scripts/generate_index.py

      - name: Deploy Dashboard Index
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-root
          keep_files: true
