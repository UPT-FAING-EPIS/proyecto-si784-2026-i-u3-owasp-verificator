name: Pruebas de Mutantes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  mutation-tests:
    name: Pruebas de Mutación con Mutmut
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install "mutmut<3.0"


      - name: Ejecutar pruebas de mutación en scanner.py
        env:
          APP_ENV: test
        run: |
          mutmut run --no-progress || true


      - name: Generar reporte de mutantes
        if: always()
        run: |
          echo "## 🧬 Resultados de Pruebas de Mutación" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          mutmut results >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resumen" >> $GITHUB_STEP_SUMMARY
          mutmut results 2>/dev/null | head -5 >> $GITHUB_STEP_SUMMARY || true

      - name: Mostrar mutantes sobrevivientes
        if: always()
        run: |
          echo "=== Mutantes sobrevivientes ==="
          mutmut results || true

      - name: Exportar reporte HTML de mutmut
        if: always()
        run: |
          mutmut html || true

      - name: Subir reporte de mutación
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-mutantes
          path: |
            html/
            .mutmut-cache
          retention-days: 15

      - name: Preparar reportes para GH Pages
        if: always()
        run: |
          mkdir -p public-mutation
          if [ -d html ]; then
            cp -r html/* public-mutation/
          else
            echo "<h1>Reporte de mutación no disponible</h1>" > public-mutation/index.html
          fi

      - name: Deploy Reporte Mutación a GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-mutation
          destination_dir: mutation
          keep_files: true

      - name: Generar e integrar Index Dashboard
        if: always()
        run: |
          python3 scripts/generate_index.py

      - name: Deploy Dashboard Index
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-root
          keep_files: true
