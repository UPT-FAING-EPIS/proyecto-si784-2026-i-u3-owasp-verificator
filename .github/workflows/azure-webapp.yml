name: Build and Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Create deployment package
        run: |
          zip -r release.zip . \
            -x "*.git*" \
               "*.venv*" \
               "*__pycache__*" \
               "*.pytest_cache*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  provision-and-deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    env:
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus' }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-owasp-verificator' }}
      AZURE_APP_SERVICE_PLAN: ${{ vars.AZURE_APP_SERVICE_PLAN || 'asp-owasp-verificator' }}
      AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve web app name
        run: |
          if [ -z "$AZURE_WEBAPP_NAME" ]; then
            BASE_NAME="$(echo "${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-')"
            BASE_NAME="${BASE_NAME:-owasp-verificator}"
            GENERATED_NAME="${BASE_NAME}-${GITHUB_REPOSITORY_ID}"
            GENERATED_NAME="$(echo "$GENERATED_NAME" | cut -c1-60 | sed 's/-$//')"
            echo "AZURE_WEBAPP_NAME=$GENERATED_NAME" >> "$GITHUB_ENV"
            echo "AZURE_WEBAPP_NAME was not provided. Using generated name: $GENERATED_NAME"
          else
            echo "Using provided AZURE_WEBAPP_NAME: $AZURE_WEBAPP_NAME"
          fi

      - name: Ensure resource group exists
        run: az group create --name "$AZURE_RESOURCE_GROUP" --location "$AZURE_LOCATION"

      - name: Ensure app service plan exists
        run: |
          az appservice plan show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_APP_SERVICE_PLAN" >/dev/null 2>&1 || \
          az appservice plan create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_APP_SERVICE_PLAN" \
            --is-linux \
            --sku B1

      - name: Ensure web app exists
        run: |
          az webapp show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" >/dev/null 2>&1 || \
          az webapp create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --plan "$AZURE_APP_SERVICE_PLAN" \
            --name "$AZURE_WEBAPP_NAME" \
            --runtime "PYTHON|3.11"

      - name: Configure startup and app settings
        run: |
          az webapp config set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --startup-file "gunicorn -w 2 -k uvicorn.workers.UvicornWorker app.main:app"

          az webapp config appsettings set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --settings APP_ENV=production APP_TITLE="OWASP Verificator" SCM_DO_BUILD_DURING_DEPLOYMENT=true

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Deploy zip package
        run: |
          az webapp deploy \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --src-path release.zip \
            --type zip \
            --track-status true

      - name: Show web app URL
        run: |
          WEBAPP_HOSTNAME="$(az webapp show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --query defaultHostName -o tsv)"

          WEBAPP_URL="https://$WEBAPP_HOSTNAME"
          echo "Web app URL: $WEBAPP_URL"
          echo "WEBAPP_URL=$WEBAPP_URL" >> "$GITHUB_ENV"

          {
            echo "### Web App URL"
            echo "$WEBAPP_URL"
          } >> "$GITHUB_STEP_SUMMARY"
