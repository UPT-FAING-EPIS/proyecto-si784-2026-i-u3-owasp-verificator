name: Análisis Estático - Snyk

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Configurar Snyk CLI
        uses: snyk/actions/setup@master

      - name: Ejecutar Snyk para verificar vulnerabilidades (SARIF)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --file=requirements.txt \
            --severity-threshold=medium \
            --sarif-file-output=snyk-results.sarif

      - name: Subir resultados SARIF a GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-results.sarif
          category: snyk

      - name: Ejecutar Snyk con reporte en consola
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test --file=requirements.txt --severity-threshold=low || true

      - name: Generar Reporte HTML con snyk-to-html
        if: always()
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk-to-html
          snyk test --file=requirements.txt --json | snyk-to-html -o snyk-report.html || true

      - name: Preparar reportes para GH Pages
        if: always()
        run: |
          mkdir -p public-snyk
          if [ -f snyk-report.html ]; then
            cp snyk-report.html public-snyk/index.html
          else
            echo "<h1>Reporte de Snyk no disponible</h1>" > public-snyk/index.html
          fi

      - name: Deploy Reporte Snyk a GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-snyk
          destination_dir: snyk
          keep_files: true

      - name: Generar e integrar Index Dashboard
        if: always()
        run: |
          python3 scripts/generate_index.py

      - name: Deploy Dashboard Index
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-root
          keep_files: true
