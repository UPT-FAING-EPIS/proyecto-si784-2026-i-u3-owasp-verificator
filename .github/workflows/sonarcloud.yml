name: Análisis Estático - SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  sonarqube:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Ejecutar tests con cobertura
        env:
          APP_ENV: test
        run: |
          python -m pytest tests/test_scanner.py tests/test_api.py tests/test_integration.py \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -q

      - name: Instalar SonarScanner CLI
        run: |
          SCANNER_VERSION="6.2.1.4610"
          curl -sSLo sonar-scanner.zip \
            "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SCANNER_VERSION}-linux-x64.zip"
          unzip -q sonar-scanner.zip
          echo "$PWD/sonar-scanner-${SCANNER_VERSION}-linux-x64/bin" >> "$GITHUB_PATH"

      - name: Ejecutar análisis SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.organization=gerardocll95 \
            -Dsonar.projectKey=gerardocll95_proyecto-si784-2026-i-u3-owasp-verificator \
            -Dsonar.projectName="Verificador de Cumplimiento OWASP" \
            -Dsonar.sources=app/ \
            -Dsonar.tests=tests/ \
            -Dsonar.python.version=3.11 \
            -Dsonar.python.coverage.reportPaths=coverage.xml \
            -Dsonar.sourceEncoding=UTF-8 \
            -Dsonar.branch.name=master \
            -Dsonar.qualitygate.wait=false

      - name: Esperar procesamiento del análisis
        run: sleep 10

      - name: Obtener resultados y publicar resumen
        if: always()
        run: |
          echo "## 🔍 Resultados de SonarCloud" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Obtener métricas del proyecto de SonarCloud
          METRICS=$(curl -sf -u "${{ secrets.SONAR_TOKEN }}:" \
            "https://sonarcloud.io/api/measures/component?component=gerardocll95_proyecto-si784-2026-i-u3-owasp-verificator&metricKeys=bugs,vulnerabilities,code_smells,coverage,duplicated_lines_density,ncloc,security_hotspots" \
            2>/dev/null || echo "{}")

          echo "$METRICS" > metrics.json

          if echo "$METRICS" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
            echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY

            echo "$METRICS" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          labels = {
              'bugs': '🐛 Bugs',
              'vulnerabilities': '🔓 Vulnerabilidades',
              'code_smells': '🦨 Code Smells',
              'coverage': '📊 Cobertura',
              'duplicated_lines_density': '📋 Líneas duplicadas',
              'ncloc': '📏 Líneas de código',
              'security_hotspots': '🔥 Security Hotspots',
          }
          for m in data.get('component', {}).get('measures', []):
              name = labels.get(m['metric'], m['metric'])
              val = m['value']
              if m['metric'] in ('coverage', 'duplicated_lines_density'):
                  val += '%'
              print(f'| {name} | {val} |')
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No se pudieron obtener métricas" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No se pudieron obtener métricas del análisis" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Generar Reporte Sonar HTML
        if: always()
        run: |
          python3 scripts/generate_sonar_report.py

      - name: Preparar reportes para GH Pages
        if: always()
        run: |
          mkdir -p public-sonar
          if [ -f sonar-report.html ]; then
            cp sonar-report.html public-sonar/index.html
          else
            echo "<h1>Reporte de SonarCloud no disponible</h1>" > public-sonar/index.html
          fi

      - name: Deploy Reporte Sonar a GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-sonar
          destination_dir: sonar
          keep_files: true

      - name: Generar e integrar Index Dashboard
        if: always()
        run: |
          python3 scripts/generate_index.py

      - name: Deploy Dashboard Index
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-root
          keep_files: true
