name: Pruebas BDD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  bdd-tests:
    name: Pruebas BDD con Behave
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install behave behave-html-formatter

      # Escenarios BDD ya creados en features/


      - name: Ejecutar pruebas BDD
        env:
          APP_ENV: test
        run: |
          python -m behave features/ \
            -f behave_html_formatter:HTMLFormatter -o bdd-report.html \
            --no-capture \
            --junit \
            --junit-directory bdd-results/

      - name: Publicar resumen
        if: always()
        run: |
          python -m behave features/ --format summary --dry-run >> $GITHUB_STEP_SUMMARY 2>/dev/null || true


      - name: Subir resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-bdd
          path: |
            bdd-results/
            bdd-report.html
          retention-days: 15

      - name: Preparar reportes para GH Pages
        if: always()
        run: |
          mkdir -p public-bdd
          if [ -f bdd-report.html ]; then
            cp bdd-report.html public-bdd/index.html
          else
            echo "<h1>Reporte BDD no disponible</h1>" > public-bdd/index.html
          fi

      - name: Deploy Reporte BDD a GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-bdd
          destination_dir: bdd
          keep_files: true

      - name: Generar e integrar Index Dashboard
        if: always()
        run: |
          python3 scripts/generate_index.py

      - name: Deploy Dashboard Index
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-root
          keep_files: true
