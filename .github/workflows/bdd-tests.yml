name: Pruebas BDD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  bdd-tests:
    name: Pruebas BDD con Behave
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install behave

      # Escenarios BDD ya creados en features/


      - name: Ejecutar pruebas BDD
        env:
          APP_ENV: test
        run: |
          python -m behave features/ \
            --format pretty \
            --no-capture \
            --junit \
            --junit-directory bdd-results/

      - name: Publicar resumen
        if: always()
        run: |
          python -m behave features/ --format summary --dry-run >> $GITHUB_STEP_SUMMARY 2>/dev/null || true


      - name: Subir resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-bdd
          path: bdd-results/
          retention-days: 15
