name: Pruebas de Interfaz (UI)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ui-tests:
    name: Pruebas de Interfaz con Playwright
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias del proyecto
        run: pip install -r requirements.txt

      - name: Instalar Playwright, pytest-html y navegadores
        run: |
          pip install pytest-playwright playwright pytest-html
          playwright install --with-deps chromium

      # Pruebas ya creadas en tests/test_ui.py


      - name: Ejecutar pruebas de interfaz
        env:
          APP_ENV: test
        run: |
          python -m pytest tests/test_ui.py \
            -v \
            --tb=short \
            --junitxml=ui-results.xml \
            --html=ui-report.html --self-contained-html

      - name: Publicar resumen
        if: always()
        run: |
          echo "## 🖥️ Resultados de Pruebas de Interfaz" >> $GITHUB_STEP_SUMMARY
          if [ -f ui-results.xml ]; then
            TESTS=$(grep -oP 'tests="\K[^"]+' ui-results.xml || echo "0")
            FAILURES=$(grep -oP 'failures="\K[^"]+' ui-results.xml || echo "0")
            echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Tests ejecutados | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Fallos | $FAILURES |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Subir resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-ui
          path: |
            ui-results.xml
            ui-report.html
          retention-days: 15

      - name: Preparar reportes para GH Pages
        if: always()
        run: |
          mkdir -p public-ui
          if [ -f ui-report.html ]; then
            cp ui-report.html public-ui/index.html
          else
            echo "<h1>Reporte de interfaz no disponible</h1>" > public-ui/index.html
          fi

      - name: Deploy Reporte de Interfaz a GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-ui
          destination_dir: ui
          keep_files: true

      - name: Generar e integrar Index Dashboard
        if: always()
        run: |
          python3 scripts/generate_index.py

      - name: Deploy Dashboard Index
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-root
          keep_files: true
