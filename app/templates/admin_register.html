{% extends 'base.html' %}
{% block content %}
<div style="max-width: 420px; margin: 60px auto; display: flex; flex-direction: column; gap: 24px;">
    <div style="text-align: center;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 12px;"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        <h2 style="font-family: var(--font-title); font-size: 1.5rem; font-weight: 700; letter-spacing: -0.3px; color: var(--text);">Registro de Cuenta</h2>
        <p style="color: var(--muted); font-size: 0.875rem; margin-top: 4px;">Crea tu cuenta de auditor para escanear y mitigar riesgos.</p>
    </div>

    <div class="card" style="padding: 32px; border: 1px solid var(--panel-border); background: var(--panel-bg); margin-bottom: 0;">
        {% if error %}
        <div class="alert-danger">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/register" style="display: flex; flex-direction: column; gap: 16px;">
            <div>
                <label for="username">Nombre de Usuario</label>
                <input id="username" type="text" name="username" placeholder="Tu nombre de usuario" required>
            </div>
            
            <div>
                <label for="email">Correo Electrónico</label>
                <input id="email" type="email" name="email" placeholder="nombre@empresa.com" required>
            </div>
            
            <div>
                <label for="password">Contraseña</label>
                <input id="password" type="password" name="password" placeholder="Mínimo 6 caracteres" required>
            </div>

            <button class="button" type="submit" style="width: 100%; margin-top: 8px;">Crear mi Cuenta</button>
        </form>
    </div>

    <div style="text-align: center; display: flex; flex-direction: column; gap: 16px; font-size: 0.875rem;">
        <div style="color: var(--muted);">
            ¿Ya tienes cuenta? <a href="/login" style="color: var(--accent-2); font-weight: 600; text-decoration: none;">Inicia sesión aquí</a>
        </div>
        <div>
            <a href="/" class="button button-secondary" style="display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; font-size: 0.85rem; font-weight: 500;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                <span>Volver al Dashboard</span>
            </a>
        </div>
    </div>
</div>
{% endblock %}
